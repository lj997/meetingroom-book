spring.application.name=meetingroom-book
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/meetingroom
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.open-in-view=false

jwt.secret=meetingroomBookingSystemSecretKeyForJwtTokenGeneration2024
jwt.expiration=86400000

spring.security.user.name=admin
spring.security.user.password=admin123

logging.level.root=WARN
logging.level.com.example.meetingroom=INFO
logging.level.org.hibernate=WARN
